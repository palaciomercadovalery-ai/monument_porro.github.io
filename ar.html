<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Experiencia AR | Monumento al Porro</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Georgia, serif; }
        .info {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 0.9rem;
            z-index: 100;
            backdrop-filter: blur(8px);
            pointer-events: none;
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            font-family: Georgia, serif;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(4px);
        }
        @media (max-width: 600px) {
            .info { font-size: 0.7rem; bottom: 10px; }
            .back-btn { top: 10px; left: 10px; font-size: 0.7rem; }
        }
    </style>
    <!-- AR.js + A-Frame -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>
</head>
<body>
    <button class="back-btn" onclick="window.close();">← Cerrar</button>
    <div class="info">🔍 Apunta la cámara al marcador HIRO (descárgalo de internet) para ver el modelo 3D.</div>

    <!-- Escena AR -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <!-- Marcador HIRO estándar -->
        <a-marker preset="hiro">
            <!-- Modelo 3D dinámico (se pasa por URL) -->
            <a-entity id="modelo" scale="0.5 0.5 0.5" rotation="0 0 0"
                      animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
            </a-entity>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // Obtener parámetros de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const modeloURL = decodeURIComponent(urlParams.get('modelo') || '');
        const nombreInstrumento = decodeURIComponent(urlParams.get('nombre') || 'Instrumento');

        if (modeloURL) {
            // Esperar a que la escena esté lista y cargar el modelo
            const scene = document.querySelector('a-scene');
            scene.addEventListener('loaded', () => {
                const modelEntity = document.getElementById('modelo');
                if (modelEntity) {
                    modelEntity.setAttribute('gltf-model', modeloURL);
                    // Añadir información al tooltip (opcional)
                    const infoDiv = document.querySelector('.info');
                    infoDiv.innerHTML = `🎵 ${nombreInstrumento} - Apunta al marcador HIRO`;
                } else {
                    console.error("No se encontró el elemento modelo");
                }
            });
        } else {
            document.querySelector('.info').innerHTML = "❌ Error: No se especificó el modelo. Vuelve a la página principal.";
        }

        // Función para intentar cerrar la pestaña (no siempre funciona en todos los navegadores)
        document.querySelector('.back-btn').addEventListener('click', () => {
            if (window.history.length > 1) window.history.back();
            else window.close();
        });
    </script>
</body>
</html>
