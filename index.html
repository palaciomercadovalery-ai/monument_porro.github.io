<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Monumento al Porro | Realidad Aumentada</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Georgia, serif; }
        #controls {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 100;
            background: rgba(0,0,0,0.7);
            padding: 12px;
            backdrop-filter: blur(8px);
            border-top: 1px solid #C49A6C;
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        button {
            background: #C49A6C;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-family: Georgia, serif;
            font-size: 1rem;
            cursor: pointer;
        }
        button:active { transform: scale(0.96); }
        .status {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 20px;
            color: #C49A6C;
            font-size: 0.8rem;
            z-index: 100;
            font-family: monospace;
            backdrop-filter: blur(4px);
        }
        .detected-badge {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 8px 20px;
            color: white;
            border-left: 3px solid #C49A6C;
            font-weight: bold;
            z-index: 100;
            display: none;
            white-space: nowrap;
            font-family: Georgia, serif;
            pointer-events: none;
        }
        @media (max-width: 600px) {
            .detected-badge { font-size: 0.8rem; bottom: 90px; white-space: normal; width: 80%; text-align: center; }
            button { padding: 8px 16px; font-size: 0.8rem; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
    <div class="status" id="status">⚙️ Inactivo</div>
    <div class="detected-badge" id="detectedBadge">🎯 Detectado: <span id="detectedName">---</span></div>
    <div id="controls">
        <button id="startBtn">📷 Activar Cámara AR</button>
        <button id="stopBtn" style="display:none;">🛑 Detener</button>
    </div>

    <!-- Escena A-Frame con todos los targets estáticos -->
    <a-scene id="arScene"
        mindar-image="imageTargetSrc: null; autoStart: false; uiLoading: no; uiScanning: no; uiError: no;"
        embedded
        vr-mode-ui="enabled: false"
        renderer="antialias: true"
        style="position: absolute; inset: 0; z-index: 1; display: none;">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- PLATILLOS -->
        <a-entity mindar-image-target="imageTargetSrc: ./targets/platillos.mind;">
            <a-entity gltf-model="./modelos/PLATILLOS.glb" scale="0.5 0.5 0.5" position="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
            </a-entity>
            <a-entity sound="src: ./sonidos/platillos.mp3; autoplay: false; loop: true; volume: 0.8;"></a-entity>
        </a-entity>

        <!-- REDOBLANTE -->
        <a-entity mindar-image-target="imageTargetSrc: ./targets/redoblante.mind;">
            <a-entity gltf-model="./modelos/REDOBLANTE.glb" scale="0.5 0.5 0.5" position="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 18000; easing: linear">
            </a-entity>
            <a-entity sound="src: ./sonidos/redoblante.mp3; autoplay: false; loop: true; volume: 0.8;"></a-entity>
        </a-entity>

        <!-- TROMPETA -->
        <a-entity mindar-image-target="imageTargetSrc: ./targets/trompeta.mind;">
            <a-entity gltf-model="./modelos/TROMPETA.glb" scale="0.5 0.5 0.5" position="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear">
            </a-entity>
            <a-entity sound="src: ./sonidos/trompeta.mp3; autoplay: false; loop: true; volume: 0.8;"></a-entity>
        </a-entity>

        <!-- BOMBO -->
        <a-entity mindar-image-target="imageTargetSrc: ./targets/bombo.mind;">
            <a-entity gltf-model="./modelos/BOMBO.glb" scale="0.5 0.5 0.5" position="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 22000; easing: linear">
            </a-entity>
            <a-entity sound="src: ./sonidos/bombo.mp3; autoplay: false; loop: true; volume: 0.8;"></a-entity>
        </a-entity>

        <!-- CLARINETE -->
        <a-entity mindar-image-target="imageTargetSrc: ./targets/clarinete.mind;">
            <a-entity gltf-model="./modelos/CLARINETE.glb" scale="0.5 0.5 0.5" position="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 16000; easing: linear">
            </a-entity>
            <a-entity sound="src: ./sonidos/clarinete.mp3; autoplay: false; loop: true; volume: 0.8;"></a-entity>
        </a-entity>

        <!-- TROMBÓN -->
        <a-entity mindar-image-target="imageTargetSrc: ./targets/trombon.mind;">
            <a-entity gltf-model="./modelos/TROMBON.glb" scale="0.5 0.5 0.5" position="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 19000; easing: linear">
            </a-entity>
            <a-entity sound="src: ./sonidos/trombon.mp3; autoplay: false; loop: true; volume: 0.8;"></a-entity>
        </a-entity>

        <!-- MARÍA VARILLA -->
        <a-entity mindar-image-target="imageTargetSrc: ./targets/maria_varilla.mind;">
            <a-entity gltf-model="./modelos/MARIA_VARILLA.glb" scale="0.5 0.5 0.5" position="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
            </a-entity>
            <a-entity sound="src: ./sonidos/maria_varilla.mp3; autoplay: false; loop: true; volume: 0.8;"></a-entity>
        </a-entity>
    </a-scene>

    <script>
        // Variables globales
        let mindarSystem = null;
        let arActive = false;
        let currentSound = null;

        const statusDiv = document.getElementById('status');
        const detectedBadge = document.getElementById('detectedBadge');
        const detectedNameSpan = document.getElementById('detectedName');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const arScene = document.getElementById('arScene');

        // Función para mostrar detección (usando eventos)
        function setupDetectionEvents() {
            const targets = arScene.querySelectorAll('[mindar-image-target]');
            const targetNames = [
                "Platillos", "Redoblante", "Trompeta", "Bombo",
                "Clarinete", "Trombón", "María Varilla"
            ];
            targets.forEach((target, idx) => {
                target.addEventListener('targetFound', () => {
                    detectedNameSpan.textContent = targetNames[idx];
                    detectedBadge.style.display = 'block';
                    // Reproducir sonido (detener anterior)
                    const soundComp = target.querySelector('[sound]');
                    if (soundComp && soundComp.components && soundComp.components.sound) {
                        if (currentSound && currentSound !== soundComp.components.sound) {
                            currentSound.stopSound();
                        }
                        soundComp.components.sound.playSound();
                        currentSound = soundComp.components.sound;
                    }
                });
                target.addEventListener('targetLost', () => {
                    detectedBadge.style.display = 'none';
                    if (currentSound) {
                        currentSound.stopSound();
                        currentSound = null;
                    }
                });
            });
        }

        async function startAR() {
            if (arActive) return;
            statusDiv.innerHTML = '🔍 Solicitando cámara...';
            startBtn.disabled = true;
            startBtn.textContent = '⏳ Iniciando...';

            // Mostrar escena
            arScene.style.display = 'block';
            
            // Forzar un pequeño delay para asegurar que el DOM esté listo
            await new Promise(r => setTimeout(r, 100));
            
            // Obtener el sistema de MindAR
            mindarSystem = arScene.systems['mindar-image-system'];
            if (!mindarSystem) {
                statusDiv.innerHTML = '❌ Error: MindAR no inicializado. Recarga la página.';
                console.error('MindAR system missing');
                arScene.style.display = 'none';
                startBtn.disabled = false;
                startBtn.textContent = '📷 Activar Cámara AR';
                return;
            }
            
            try {
                await mindarSystem.start();
                // Forzar cámara trasera
                const camera = arScene.querySelector('a-camera');
                if (camera && camera.components && camera.components.camera) {
                    const cam = camera.components.camera.camera;
                    if (cam) cam.userData = { facingMode: 'environment' };
                }
                statusDiv.innerHTML = '✅ AR activa - Apunta a una estatua';
                arActive = true;
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                setupDetectionEvents();
            } catch (err) {
                console.error(err);
                statusDiv.innerHTML = '⚠️ No se pudo iniciar AR. Verifica permisos y HTTPS.';
                arScene.style.display = 'none';
                startBtn.disabled = false;
                startBtn.textContent = '📷 Activar Cámara AR';
            }
        }

        function stopAR() {
            if (!arActive) return;
            if (mindarSystem) mindarSystem.stop();
            arScene.style.display = 'none';
            arActive = false;
            detectedBadge.style.display = 'none';
            if (currentSound) {
                currentSound.stopSound();
                currentSound = null;
            }
            statusDiv.innerHTML = '⚙️ Detenido';
            startBtn.disabled = false;
            startBtn.textContent = '📷 Activar Cámara AR';
            startBtn.style.display = 'inline-block';
            stopBtn.style.display = 'none';
        }

        startBtn.addEventListener('click', startAR);
        stopBtn.addEventListener('click', stopAR);

        // Desbloquear audio en móviles: primer toque reproduce silencio para habilitar autoplay
        document.body.addEventListener('touchstart', () => {
            const silent = new Audio();
            silent.play().catch(()=>{});
        }, { once: true });
    </script>
</body>
</html>
