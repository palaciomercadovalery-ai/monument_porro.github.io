<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Monumento al Porro | Realidad Aumentada con MindAR</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Georgia', 'Times New Roman', serif;
        }
        /* Información flotante */
        .info-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            color: #fff;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            text-align: center;
            z-index: 100;
            pointer-events: none;
            white-space: nowrap;
            border: 1px solid #C49A6C;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .status {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            padding: 6px 14px;
            border-radius: 30px;
            color: #C49A6C;
            font-size: 0.75rem;
            font-family: monospace;
            z-index: 100;
            pointer-events: none;
            border-left: 2px solid #C49A6C;
        }
        .title {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            padding: 5px 12px;
            border-radius: 20px;
            color: white;
            font-size: 0.8rem;
            font-weight: bold;
            z-index: 100;
            pointer-events: none;
        }
        @media (max-width: 600px) {
            .info-panel { font-size: 0.65rem; white-space: normal; width: 90%; text-align: center; padding: 8px 12px; bottom: 10px; }
            .status { top: 10px; right: 10px; font-size: 0.6rem; }
            .title { top: 10px; left: 10px; font-size: 0.65rem; }
        }
    </style>
    <!-- Importar MindAR + A-Frame (versiones estables) -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>

    <!-- Elementos de interfaz de usuario -->
    <div class="title">🎺 MONUMENTO AL PORRO | RA</div>
    <div class="info-panel">📱 Apunta la cámara a una de las 7 estatuas de bronce. El modelo 3D y el sonido se activarán automáticamente.</div>
    <div class="status" id="detectionStatus">🔍 Esperando detección...</div>

    <!-- Escena A-Frame con MindAR -->
    <a-scene
        mindar-image="imageTargetSrc: ./targets/; autoStart: true; uiLoading: no; uiScanning: no; uiError: no;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        background="color: #000000"
        renderer="antialias: true"
        style="width: 100%; height: 100vh; position: absolute; top: 0; left: 0;">

        <!-- Cámara necesaria -->
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- =================== TARGETS =================== -->

        <!-- 1. PLATILLOS -->
        <a-entity mindar-image-target="imageTargetSrc: ./targets/platillos.mind;">
            <a-entity
                gltf-model="./modelos/PLATILLOS.glb"
                scale="0.6 0.6 0.6"
                position="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
            </a-entity>
            <a-entity sound="src: ./sonidos/platillos.mp3; autoplay: true; volume: 0.8;"></a-entity>
        </a-entity>

        <!-- 2. REDOBLANTE -->
        <a-entity mindar-image-target="imageTargetSrc: ./targets/redoblante.mind;">
            <a-entity
                gltf-model="./modelos/REDOBLANTE.glb"
                scale="0.6 0.6 0.6"
                position="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 18000; easing: linear">
            </a-entity>
            <a-entity sound="src: ./sonidos/redoblante.mp3; autoplay: true; volume: 0.8;"></a-entity>
        </a-entity>

        <!-- 3. TROMPETA -->
        <a-entity mindar-image-target="imageTargetSrc: ./targets/trompeta.mind;">
            <a-entity
                gltf-model="./modelos/TROMPETA.glb"
                scale="0.6 0.6 0.6"
                position="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear">
            </a-entity>
            <a-entity sound="src: ./sonidos/trompeta.mp3; autoplay: true; volume: 0.8;"></a-entity>
        </a-entity>

        <!-- 4. BOMBO -->
        <a-entity mindar-image-target="imageTargetSrc: ./targets/bombo.mind;">
            <a-entity
                gltf-model="./modelos/BOMBO.glb"
                scale="0.6 0.6 0.6"
                position="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 22000; easing: linear">
            </a-entity>
            <a-entity sound="src: ./sonidos/bombo.mp3; autoplay: true; volume: 0.8;"></a-entity>
        </a-entity>

        <!-- 5. CLARINETE -->
        <a-entity mindar-image-target="imageTargetSrc: ./targets/clarinete.mind;">
            <a-entity
                gltf-model="./modelos/CLARINETE.glb"
                scale="0.6 0.6 0.6"
                position="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 16000; easing: linear">
            </a-entity>
            <a-entity sound="src: ./sonidos/clarinete.mp3; autoplay: true; volume: 0.8;"></a-entity>
        </a-entity>

        <!-- 6. TROMBÓN -->
        <a-entity mindar-image-target="imageTargetSrc: ./targets/trombon.mind;">
            <a-entity
                gltf-model="./modelos/TROMBON.glb"
                scale="0.6 0.6 0.6"
                position="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 19000; easing: linear">
            </a-entity>
            <a-entity sound="src: ./sonidos/trombon.mp3; autoplay: true; volume: 0.8;"></a-entity>
        </a-entity>

        <!-- 7. MARÍA VARILLA -->
        <a-entity mindar-image-target="imageTargetSrc: ./targets/maria_varilla.mind;">
            <a-entity
                gltf-model="./modelos/MARIA_VARILLA.glb"
                scale="0.6 0.6 0.6"
                position="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
            </a-entity>
            <a-entity sound="src: ./sonidos/maria_varilla.mp3; autoplay: true; volume: 0.8;"></a-entity>
        </a-entity>

    </a-scene>

    <!-- Script para actualizar el estado de detección en la interfaz -->
    <script>
        (function() {
            const statusDiv = document.getElementById('detectionStatus');
            let lastDetected = null;

            function updateDetectionStatus() {
                // Buscar cualquier target visible (MindAR añade un atributo 'visible' cuando detecta)
                const activeTargets = Array.from(document.querySelectorAll('a-entity[mindar-image-target]')).filter(el => {
                    // Verificar si el target está visible (MindAR expone una propiedad o podemos usar el atributo 'visible')
                    // Método sencillo: cuando MindAR detecta, añade la clase 'mindar-target-detected'? No, mejor comprobar si el modelo dentro está visible.
                    // Alternativa: comprobar si el elemento tiene el atributo 'visible' igual a 'true' (A-Frame lo gestiona)
                    return el.getAttribute('visible') === 'true';
                });

                if (activeTargets.length > 0) {
                    const targetEl = activeTargets[0];
                    const targetSrc = targetEl.getAttribute('mindar-image-target')?.imageTargetSrc;
                    let instrumentName = "Desconocido";
                    if (targetSrc) {
                        if (targetSrc.includes('platillos')) instrumentName = "Platillos";
                        else if (targetSrc.includes('redoblante')) instrumentName = "Redoblante";
                        else if (targetSrc.includes('trompeta')) instrumentName = "Trompeta";
                        else if (targetSrc.includes('bombo')) instrumentName = "Bombo";
                        else if (targetSrc.includes('clarinete')) instrumentName = "Clarinete";
                        else if (targetSrc.includes('trombon')) instrumentName = "Trombón";
                        else if (targetSrc.includes('maria_varilla')) instrumentName = "María Varilla";
                    }
                    if (lastDetected !== instrumentName) {
                        statusDiv.innerHTML = `🎯 DETECTADO: ${instrumentName}`;
                        statusDiv.style.opacity = '1';
                        lastDetected = instrumentName;
                        // Efecto sutil de flash en el borde derecho
                        statusDiv.style.transition = '0.2s';
                        statusDiv.style.color = '#f0c28a';
                        setTimeout(() => { statusDiv.style.color = '#C49A6C'; }, 500);
                    }
                } else {
                    if (lastDetected !== null) {
                        statusDiv.innerHTML = `🔍 Buscando estatuas...`;
                        lastDetected = null;
                    }
                }
                requestAnimationFrame(updateDetectionStatus);
            }

            // Iniciar el monitoreo cuando la escena esté lista
            window.addEventListener('load', () => {
                setTimeout(updateDetectionStatus, 1000);
            });
        })();
    </script>
</body>
</html>
