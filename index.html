<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Monumento al Porro | AR con MindAR</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Georgia, serif;
        }
        #controls {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 100;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            backdrop-filter: blur(8px);
            border-top: 1px solid #C49A6C;
        }
        button {
            background: #C49A6C;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-family: Georgia, serif;
            font-size: 1rem;
            cursor: pointer;
            margin: 0 8px;
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.96); }
        .status {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 20px;
            color: #C49A6C;
            font-size: 0.8rem;
            z-index: 100;
            font-family: monospace;
            backdrop-filter: blur(4px);
        }
        .detected-badge {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 8px 20px;
            color: white;
            border-left: 3px solid #C49A6C;
            font-weight: bold;
            z-index: 100;
            display: none;
            white-space: nowrap;
            font-family: Georgia, serif;
        }
        @media (max-width: 600px) {
            .detected-badge { font-size: 0.8rem; bottom: 90px; white-space: normal; width: 80%; text-align: center; }
            button { padding: 8px 16px; font-size: 0.8rem; }
        }
    </style>
    <!-- MindAR A-Frame -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
    <div class="status" id="status">⚙️ Inactivo</div>
    <div class="detected-badge" id="detectedBadge">🎯 Detectado: <span id="detectedName">---</span></div>
    <div id="controls">
        <button id="startBtn">📷 Activar Cámara AR</button>
        <button id="stopBtn" style="display:none;">🛑 Detener</button>
    </div>

    <!-- Escena A-Frame que se llenará dinámicamente -->
    <div id="arContainer" style="position: absolute; inset: 0; z-index: 1;"></div>

    <script>
        // ========== DATOS DE TARGETS INDIVIDUALES ==========
        const targets = [
            { id: "platillos",   targetFile: "targets/platillos.mind",   modelFile: "modelos/PLATILLOS.glb",   soundFile: "sonidos/platillos.mp3",   name: "Platillos" },
            { id: "redoblante",  targetFile: "targets/redoblante.mind",  modelFile: "modelos/REDOBLANTE.glb",  soundFile: "sonidos/redoblante.mp3",  name: "Redoblante" },
            { id: "trompeta",    targetFile: "targets/trompeta.mind",    modelFile: "modelos/TROMPETA.glb",    soundFile: "sonidos/trompeta.mp3",    name: "Trompeta" },
            { id: "bombo",       targetFile: "targets/bombo.mind",       modelFile: "modelos/BOMBO.glb",       soundFile: "sonidos/bombo.mp3",       name: "Bombo" },
            { id: "clarinete",   targetFile: "targets/clarinete.mind",   modelFile: "modelos/CLARINETE.glb",   soundFile: "sonidos/clarinete.mp3",   name: "Clarinete" },
            { id: "trombon",     targetFile: "targets/trombon.mind",     modelFile: "modelos/TROMBON.glb",     soundFile: "sonidos/trombon.mp3",     name: "Trombón" },
            { id: "maria_varilla", targetFile: "targets/maria_varilla.mind", modelFile: "modelos/MARIA_VARILLA.glb", soundFile: "sonidos/maria_varilla.mp3", name: "María Varilla" }
        ];

        let currentAudio = null;
        let currentScene = null;
        let mindarSystem = null;
        let arActive = false;

        const statusDiv = document.getElementById('status');
        const detectedBadge = document.getElementById('detectedBadge');
        const detectedNameSpan = document.getElementById('detectedName');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const arContainer = document.getElementById('arContainer');

        function stopSound() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                currentAudio = null;
            }
        }

        function showDetected(name) {
            detectedNameSpan.textContent = name;
            detectedBadge.style.display = 'block';
            setTimeout(() => {
                if (detectedNameSpan.textContent === name) {
                    // se oculta 1 segundo después de perder detección? mejor manejarlo con targetLost
                }
            }, 500);
        }
        function hideDetected() {
            detectedBadge.style.display = 'none';
            stopSound();
        }

        async function startAR() {
            if (arActive) return;
            statusDiv.innerHTML = '🔍 Solicitando permiso de cámara...';
            startBtn.disabled = true;
            startBtn.textContent = '⏳ Iniciando...';

            // Limpiar contenedor
            arContainer.innerHTML = '';

            // Crear escena A-Frame
            const scene = document.createElement('a-scene');
            scene.setAttribute('mindar-image', 'imageTargetSrc: null; autoStart: false; uiLoading: no; uiScanning: no; uiError: no;');
            scene.setAttribute('embedded', '');
            scene.setAttribute('vr-mode-ui', 'enabled: false');
            scene.style.cssText = 'width:100%; height:100%; position:absolute; top:0; left:0;';

            // Cámara
            const camera = document.createElement('a-camera');
            camera.setAttribute('look-controls', 'enabled: false');
            scene.appendChild(camera);

            // Agregar cada target
            targets.forEach(t => {
                const targetEntity = document.createElement('a-entity');
                targetEntity.setAttribute('mindar-image-target', `imageTargetSrc: ${t.targetFile}`);
                // Modelo 3D
                const model = document.createElement('a-entity');
                model.setAttribute('gltf-model', t.modelFile);
                model.setAttribute('scale', '0.5 0.5 0.5');
                model.setAttribute('position', '0 0 0');
                model.setAttribute('visible', 'true');
                // Quitamos las animaciones para ahorrar recursos
                targetEntity.appendChild(model);
                
                // Sonido: se manejará con eventos
                let soundPlaying = false;
                targetEntity.addEventListener('targetFound', () => {
                    if (soundPlaying) return;
                    soundPlaying = true;
                    showDetected(t.name);
                    if (currentAudio) currentAudio.pause();
                    const audio = new Audio(t.soundFile);
                    audio.loop = true;
                    audio.play().catch(e => console.warn('Autoplay bloqueado, toca la pantalla'));
                    currentAudio = audio;
                    audio.onended = () => { soundPlaying = false; };
                });
                targetEntity.addEventListener('targetLost', () => {
                    soundPlaying = false;
                    hideDetected();
                });
                scene.appendChild(targetEntity);
            });

            arContainer.appendChild(scene);
            currentScene = scene;

            // Esperar a que la escena esté cargada
            scene.addEventListener('loaded', async () => {
                mindarSystem = scene.systems['mindar-image-system'];
                if (!mindarSystem) {
                    statusDiv.innerHTML = '❌ Error: MindAR no inicializado. Verifica la consola.';
                    console.error('MindAR system not found');
                    return;
                }
                try {
                    await mindarSystem.start();
                    statusDiv.innerHTML = '✅ AR activa - Apunta a una estatua';
                    arActive = true;
                    startBtn.style.display = 'none';
                    stopBtn.style.display = 'inline-block';
                    // Forzar cámara trasera
                    const cam = scene.querySelector('a-camera');
                    if (cam && cam.components.camera) {
                        cam.components.camera.camera.userData = { facingMode: 'environment' };
                        // Reiniciar para aplicar
                        cam.components.camera.update();
                    }
                } catch (err) {
                    console.error(err);
                    statusDiv.innerHTML = '⚠️ Error al iniciar AR: ' + err.message;
                    startBtn.disabled = false;
                    startBtn.textContent = '📷 Activar Cámara AR';
                }
            });
        }

        function stopAR() {
            if (!arActive) return;
            if (mindarSystem) mindarSystem.stop();
            if (currentScene) {
                arContainer.removeChild(currentScene);
                currentScene = null;
            }
            stopSound();
            hideDetected();
            arActive = false;
            statusDiv.innerHTML = '⚙️ Detenido';
            startBtn.disabled = false;
            startBtn.textContent = '📷 Activar Cámara AR';
            startBtn.style.display = 'inline-block';
            stopBtn.style.display = 'none';
        }

        startBtn.addEventListener('click', startAR);
        stopBtn.addEventListener('click', stopAR);

        // Ayuda para desbloquear audio en dispositivos móviles
        document.body.addEventListener('touchstart', () => {
            if (currentAudio && currentAudio.paused) currentAudio.play().catch(e=>{});
        }, { once: true });
    </script>
</body>
</html>
