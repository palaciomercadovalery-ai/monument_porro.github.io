<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Monumento al Porro | RA con reconocimiento de imágenes</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Georgia, serif; }
        .info {
            position: fixed; bottom: 20px; left: 0; right: 0;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            color: white; text-align: center; padding: 10px;
            font-size: 0.9rem; z-index: 100; border-radius: 30px;
            width: fit-content; margin: 0 auto; pointer-events: none;
            border: 1px solid #C49A6C;
        }
        .status {
            position: fixed; top: 20px; right: 16px;
            background: rgba(0,0,0,0.6); padding: 6px 12px;
            border-radius: 20px; color: #C49A6C; font-size: 0.7rem;
            font-family: monospace; z-index: 100;
        }
        @media (max-width: 600px) {
            .info { font-size: 0.7rem; bottom: 10px; }
        }
    </style>
    <!-- MindAR + A-Frame -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.3/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
    <div class="info">🎺 Apunta la cámara a una de las 7 estatuas de bronce. El modelo 3D aparecerá automáticamente.</div>
    <div class="status" id="status">🔍 Esperando detección...</div>

    <a-scene mindar-image="imageTargetSrc: ./targets/; autoStart: true; uiLoading: no; uiScanning: no;" vr-mode-ui="enabled: false" background="color: #000000">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- PLATILLOS -->
        <a-entity mindar-image-target="imageTargetSrc: ./targets/platillos.mind;">
            <a-entity gltf-model="./modelos/PLATILLOS.glb" scale="0.5 0.5 0.5" position="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear"></a-entity>
            <a-entity sound="src: ./sonidos/platillos.mp3; autoplay: true; volume: 0.8;"></a-entity>
        </a-entity>

        <!-- REDOBLANTE -->
        <a-entity mindar-image-target="imageTargetSrc: ./targets/redoblante.mind;">
            <a-entity gltf-model="./modelos/REDOBLANTE.glb" scale="0.5 0.5 0.5" position="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 18000; easing: linear"></a-entity>
            <a-entity sound="src: ./sonidos/redoblante.mp3; autoplay: true; volume: 0.8;"></a-entity>
        </a-entity>

        <!-- TROMPETA -->
        <a-entity mindar-image-target="imageTargetSrc: ./targets/trompeta.mind;">
            <a-entity gltf-model="./modelos/TROMPETA.glb" scale="0.5 0.5 0.5" position="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear"></a-entity>
            <a-entity sound="src: ./sonidos/trompeta.mp3; autoplay: true; volume: 0.8;"></a-entity>
        </a-entity>

        <!-- BOMBO -->
        <a-entity mindar-image-target="imageTargetSrc: ./targets/bombo.mind;">
            <a-entity gltf-model="./modelos/BOMBO.glb" scale="0.5 0.5 0.5" position="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 22000; easing: linear"></a-entity>
            <a-entity sound="src: ./sonidos/bombo.mp3; autoplay: true; volume: 0.8;"></a-entity>
        </a-entity>

        <!-- CLARINETE -->
        <a-entity mindar-image-target="imageTargetSrc: ./targets/clarinete.mind;">
            <a-entity gltf-model="./modelos/CLARINETE.glb" scale="0.5 0.5 0.5" position="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 16000; easing: linear"></a-entity>
            <a-entity sound="src: ./sonidos/clarinete.mp3; autoplay: true; volume: 0.8;"></a-entity>
        </a-entity>

        <!-- TROMBÓN -->
        <a-entity mindar-image-target="imageTargetSrc: ./targets/trombon.mind;">
            <a-entity gltf-model="./modelos/TROMBON.glb" scale="0.5 0.5 0.5" position="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 19000; easing: linear"></a-entity>
            <a-entity sound="src: ./sonidos/trombon.mp3; autoplay: true; volume: 0.8;"></a-entity>
        </a-entity>

        <!-- MARÍA VARILLA -->
        <a-entity mindar-image-target="imageTargetSrc: ./targets/maria_varilla.mind;">
            <a-entity gltf-model="./modelos/MARIA_VARILLA.glb" scale="0.5 0.5 0.5" position="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear"></a-entity>
            <a-entity sound="src: ./sonidos/maria_varilla.mp3; autoplay: true; volume: 0.8;"></a-entity>
        </a-entity>
    </a-scene>

    <script>
        // Actualizar estado de detección en la interfaz
        setInterval(() => {
            const active = document.querySelectorAll('a-entity[mindar-image-target][visible="true"]');
            const statusDiv = document.getElementById('status');
            if (active.length) {
                const src = active[0].getAttribute('mindar-image-target')?.imageTargetSrc || '';
                let name = 'Desconocido';
                if (src.includes('platillos')) name = 'Platillos';
                else if (src.includes('redoblante')) name = 'Redoblante';
                else if (src.includes('trompeta')) name = 'Trompeta';
                else if (src.includes('bombo')) name = 'Bombo';
                else if (src.includes('clarinete')) name = 'Clarinete';
                else if (src.includes('trombon')) name = 'Trombón';
                else if (src.includes('maria_varilla')) name = 'María Varilla';
                statusDiv.innerHTML = `🎯 Detectado: ${name}`;
            } else {
                statusDiv.innerHTML = `🔍 Apunta a una estatua...`;
            }
        }, 500);
    </script>
</body>
</html>
